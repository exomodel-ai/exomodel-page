site_name: ExoModel AI
site_url: https://exomodel.ai
site_description: Object-Oriented Agentic AI Framework
site_author: ExoModel Team
repo_url: https://github.com/exomodel-ai/exomodel
repo_name: exomodel-ai/exomodel

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../exomodel/src]
          options:
            show_root_heading: true
            show_source: true
            members_order: alphabetical
            filters: ["!^_[^_]", "!^model_"]  # Show public members, exclude pydantic internal ones

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Usage: usage.md
  - Reference Guide: reference.md
